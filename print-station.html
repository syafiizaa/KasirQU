<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Station - Kasir POS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Print Station Specific Styles */
        body {
            background: var(--gray-900);
            min-height: 100vh;
        }

        /* Print overrides - ensure only receipt is printed */
        @media print {
            /* Force page size for 58mm thermal */
            @page {
                size: 58mm auto !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            
            html, body {
                width: 48mm !important;
                height: auto !important;
                min-height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                overflow: visible !important;
            }
            
            /* Hide ALL page elements */
            body > *:not(#receipt-area) {
                display: none !important;
                visibility: hidden !important;
                width: 0 !important;
                height: 0 !important;
                overflow: hidden !important;
                position: absolute !important;
                left: -9999px !important;
            }
            
            /* Show only receipt */
            #receipt-area {
                display: block !important;
                visibility: visible !important;
                position: static !important;
                left: auto !important;
                width: 48mm !important;
                max-width: 48mm !important;
                margin: 0 !important;
                padding: 1mm 2mm !important;
                background: white !important;
                overflow: visible !important;
            }
            
            #receipt-area * {
                visibility: visible !important;
                position: static !important;
                left: auto !important;
            }
            
            /* Prevent page breaks */
            #receipt-area,
            #receipt-area * {
                page-break-inside: avoid !important;
                page-break-before: avoid !important;
                page-break-after: avoid !important;
                break-inside: avoid !important;
                break-before: avoid !important;
                break-after: avoid !important;
            }
        }

        .print-station-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        .station-header {
            background: var(--primary);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .station-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .station-header .subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray-800);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #22c55e;
        }

        .status-dot.offline {
            background: #ef4444;
            animation: none;
        }

        .status-dot.checking {
            background: #f59e0b;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .queue-section {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .queue-header {
            background: var(--gray-100);
            padding: 1rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .queue-header h2 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .queue-count {
            background: var(--danger);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .queue-count.empty {
            background: var(--gray-400);
        }

        .queue-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .queue-item {
            padding: 1rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .queue-item:last-child {
            border-bottom: none;
        }

        .queue-item:hover {
            background: var(--gray-50);
        }

        .queue-item-info h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .queue-item-info .meta {
            font-size: 0.85rem;
            color: var(--gray-500);
        }

        .queue-item-info .customer {
            font-size: 0.85rem;
            color: var(--gray-600);
            margin-top: 0.25rem;
        }

        .queue-item-total {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-right: 1rem;
        }

        .btn-print {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-print:hover {
            background: #15803d;
            transform: scale(1.05);
        }

        .queue-empty {
            padding: 3rem;
            text-align: center;
            color: var(--gray-500);
        }

        .queue-empty .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .queue-empty p {
            font-size: 1rem;
        }

        .last-printed {
            background: var(--gray-800);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .last-printed h3 {
            font-size: 0.85rem;
            color: var(--gray-400);
            margin-bottom: 0.5rem;
        }

        .last-printed .info {
            font-size: 1rem;
        }

        .settings-section {
            background: var(--white);
            border-radius: 12px;
            padding: 1rem;
        }

        .settings-section h3 {
            font-size: 0.9rem;
            color: var(--gray-600);
            margin-bottom: 0.75rem;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }

        .settings-row label {
            font-size: 0.9rem;
        }

        .settings-row input {
            width: 80px;
            padding: 0.5rem;
            border: 1px solid var(--gray-300);
            border-radius: 4px;
            text-align: center;
        }

        .btn-reset {
            background: var(--gray-200);
            color: var(--gray-700);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .btn-reset:hover {
            background: var(--gray-300);
        }

        .back-link {
            display: block;
            text-align: center;
            color: var(--gray-400);
            text-decoration: none;
            padding: 1rem;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: white;
        }

        /* Sound notification indicator */
        .sound-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .sound-toggle input {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="print-station-container">
        <!-- Header -->
        <div class="station-header">
            <h1>🖨️ PRINT STATION</h1>
            <p class="subtitle">Antrian Cetak Otomatis</p>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Memeriksa koneksi...</span>
            </div>
            <div id="polling-status">
                Polling: <span id="polling-interval">3</span>s
            </div>
        </div>

        <!-- Queue Section -->
        <div class="queue-section">
            <div class="queue-header">
                <h2>📋 Antrian Cetak</h2>
                <span class="queue-count empty" id="queue-count">0</span>
            </div>
            <div class="queue-list" id="queue-list">
                <div class="queue-empty">
                    <div class="icon">✅</div>
                    <p>Tidak ada transaksi baru</p>
                </div>
            </div>
        </div>

        <!-- Last Printed -->
        <div class="last-printed">
            <h3>✅ Terakhir Dicetak</h3>
            <div class="info" id="last-printed-info">Belum ada</div>
        </div>

        <!-- Settings -->
        <div class="settings-section">
            <h3>⚙️ Pengaturan</h3>
            <div class="settings-row">
                <label>Interval Polling (detik)</label>
                <input type="number" id="polling-input" value="3" min="1" max="30" onchange="PrintStation.updatePollingInterval()">
            </div>
            <div class="settings-row">
                <label class="sound-toggle">
                    <input type="checkbox" id="sound-enabled" checked onchange="PrintStation.toggleSound()">
                    Notifikasi suara saat ada antrian baru
                </label>
            </div>
            <button class="btn-reset" onclick="PrintStation.clearQueue()">
                🗑️ Kosongkan Antrian
            </button>
            <p style="font-size: 0.8rem; color: var(--gray-500); margin-top: 0.5rem;">
                Hapus semua item dari antrian cetak
            </p>
        </div>

        <!-- Back Link -->
        <a href="index.html" class="back-link">← Kembali ke Home</a>
    </div>

    <!-- Receipt Area (Hidden, used for printing) -->
    <div id="receipt-area"></div>

    <!-- Audio for notification -->
    <audio id="notification-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleDs6teleDs6teleDs6teleDs6" type="audio/wav">
    </audio>

    <!-- JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/print.js"></script>
    <script src="js/print-station.js"></script>
</body>
</html>
